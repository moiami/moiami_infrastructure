name: moiami

services:
  comments-service:
    image: leoagf/comment:1.5
    restart: unless-stopped
    environment:
      DEBUG: "false"
      RESOURCE_SERVICE_URL: "resource:8000"
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/comments"
      SQLALCHEMY_DATABASE_URI: "postgresql://postgres:postgres@db:5432/comments"
      SQLALCHEMY_TRACK_MODIFICATIONS: "false"
      FLASK_RUN_NO_RELOAD: "1"
    depends_on:
      db:
        condition: service_healthy

  check:
    build:
      context: ../moiami_check_service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@db:5432/check"
      COMMENTS_SERVICE_URL: "http://comments-service:8007"
    depends_on:
      db:
        condition: service_healthy
      comments-service:
        condition: service_started

  resource:
    image: trard/moiami_resource_service:1.11
    restart: unless-stopped
    environment:
      SECRET_KEY: 'django-insecure-o&+f#_3gh5d^t=00y37i$$l!)&g44@)_g$$e0#=ourvm2g_l3w)2'
      DEBUG: true
      DB_NAME: resource
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_files:/app/staticfiles

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - resource
      - check
      - comments-service
      - sso
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - static_files:/srv/staticfiles

  sso:
    build:
      context: ../moiami_sso
      dockerfile: Dockerfile
    image: trard/moiami_sso:get-post-validate
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: 'postgresql+asyncpg://postgres:postgres@db:5432/sso'
      SECRET_KEY: 'M&6u_hdJ-)Qvx:yGkN+2|1a917e3c181d9399a72327e00f78ff8a9992aeea|3ae318fbdc247ce171ea90c244cc46e4'

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data2:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro

  s3:
    image: quay.io/minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data2:
  static_files:
  minio_data:
